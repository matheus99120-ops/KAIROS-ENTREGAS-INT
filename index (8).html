<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1a5c45; --green-dark: #0f3d2e; --green-light: #e8f4ef; --green-text: #0f3d2e;
    --navy: #1b3a4b; --gold: #c9a84c;
    --amber-light: #FAEEDA; --amber-text: #854F0B;
    --red-light: #FCEBEB; --red-text: #791F1F;
    --bg: #f4f6f5; --surface: #FFFFFF; --border: rgba(0,0,0,0.08);

    min-height: 100vh;

  header {
    background: var(--navy);
    padding: 0 2rem; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .header-badge {
    font-size: 11px; color: #7ecfaf;
    background: rgba(126,207,175,0.15);
    padding: 4px 12px; border-radius: 999px; font-weight: 500;
    border: 1px solid rgba(126,207,175,0.3);
    display: flex; align-items: center; gap: 6px;
  }
  .pulse { width: 7px; height: 7px; background: #7ecfaf; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
  main { max-width: 640px; margin: 0 auto; padding: 2.5rem 1.5rem; position: relative; z-index: 1; }
  .hero { text-align: center; margin-bottom: 2rem; }
  .hero h1 { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 8px; line-height: 1.2; color: var(--navy); }
  .hero p { font-size: 14px; color: var(--muted); }
  .search-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .search-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
  .search-row { display: flex; gap: 8px; }
  .search-row input { flex: 1; height: 48px; border: 1.5px solid var(--border); border-radius: 10px; padding: 0 16px; font-size: 16px; font-family: 'DM Sans', sans-serif; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.15s; }
  .search-row input::placeholder { color: var(--hint); }
  .search-row input:focus { border-color: var(--green); background: white; }
  .search-row button { height: 48px; padding: 0 22px; background: var(--navy); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s, transform 0.1s; white-space: nowrap; }
  .search-row button:hover { background: var(--green-dark); }
  .search-row button:active { transform: scale(0.97); }
  .search-hint { font-size: 12px; color: var(--hint); margin-top: 10px; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
  .result-nf { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; color: var(--navy); }
  .result-nf span { font-size: 13px; font-weight: 400; color: var(--muted); font-family: 'DM Sans', sans-serif; margin-right: 4px; }
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 500; }
  .badge-entregue { background: var(--green-light); color: var(--green-text); }
  .badge-pendente { background: var(--amber-light); color: var(--amber-text); }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .badge-entregue .badge-dot { background: var(--green-text); }
  .badge-pendente .badge-dot { background: var(--amber-text); }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .info-cell { background: var(--bg); border-radius: 10px; padding: 10px 14px; }
  .info-cell-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--hint); margin-bottom: 4px; }
  .info-cell-value { font-size: 14px; font-weight: 500; color: var(--text); }
  .info-cell-value.green { color: var(--green-dark); }
  .info-cell-value.amber { color: var(--amber-text); }
  .btn-comprovante { margin-top: 12px; width: 100%; padding: 11px; background: var(--green-light); color: var(--green-text); border: 1.5px solid #a8d5be; border-radius: 10px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s, transform 0.1s; }
  .btn-comprovante:hover { background: #d0eadd; }
  .btn-comprovante:active { transform: scale(0.98); }
  .comprovante-info { margin-top: 10px; background: #f0f7f4; border: 1px solid #a8d5be; border-radius: 10px; padding: 12px 14px; font-size: 12px; color: var(--green-text); display: none; animation: fadeUp 0.2s ease; }
  .comprovante-info.show { display: block; }
  .comprovante-info strong { display: block; margin-bottom: 6px; font-size: 13px; }
  .comprovante-info code { background: white; border: 1px solid #a8d5be; border-radius: 6px; padding: 6px 10px; font-size: 12px; display: block; margin-top: 6px; word-break: break-all; color: var(--navy); user-select: all; }
  .error-box { background: var(--red-light); border: 1px solid #F7C1C1; border-radius: 12px; padding: 14px 18px; color: var(--red-text); font-size: 14px; animation: fadeUp 0.2s ease; }
  .loading { text-align: center; color: var(--muted); font-size: 14px; padding: 2rem 0; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .update-bar { font-size: 11px; color: var(--hint); text-align: center; margin-top: 14px; }
  footer { text-align: center; padding: 2rem 1rem 3rem; font-size: 11px; color: var(--hint); position: relative; z-index: 1; }
  @media (max-width: 500px) {
    main { padding: 2rem 1rem; }
    .hero h1 { font-size: 24px; }
    .info-grid { grid-template-columns: 1fr; }
    .search-row { flex-direction: column; }
    .search-row button { width: 100%; }
  }
</style>

<main>
  <div class="hero">
    <h1>Rastreio de Entregas</h1>
    <p>Consulte o status da sua entrega pelo número da nota fiscal</p>
  </div>

  <div class="search-card">
    <div class="search-label">Número da nota fiscal</div>
    <div class="search-row">
      <input type="text" id="nf-input" placeholder="Ex: 12345" autocomplete="off" />
      <button onclick="buscar()">Rastrear</button>
    </div>
    <div class="search-hint">Também é possível buscar pelo número do pedido ou pedido do cliente.</div>
  </div>

  <div id="results"></div>
  <div class="update-bar" id="update-bar"></div>
</main>

<footer>© Kairós Eletrônica e Soluções — Dados sincronizados em tempo real</footer>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyInQ7wVoBVIJHGwFXVBQWhyM5WvtkWCr3Q0Hr1cOyYRajoX-ViXUGyA5-4ceoWuWmS/exec';

function norm(s) {
  return String(s || '').trim().toLowerCase().replace(/[.\-\/\s]/g, '');
}

function formatDate(s) {
  if (!s || String(s).trim() === '' || s === 'null' || s === 'undefined' || s === 'false' || s === '0') return '—';
  s = String(s).trim();
  if (s.includes('T') || (s.includes('-') && s.length > 6)) {
    const d = new Date(s);
    if (!isNaN(d.getTime())) return d.toLocaleDateString('pt-BR');
  }
  if (/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(s)) {
    const [dd, mm, yy] = s.split('/');
    return dd.padStart(2,'0') + '/' + mm.padStart(2,'0') + '/' + (yy.length===2?'20'+yy:yy);
  }
  return s;
}

function isEntregue(val) {
  const v = String(val || '').trim().toLowerCase();
  return v !== '' && v !== '—' && v !== 'null' && v !== 'undefined' && v !== 'false' && v !== '0' && v !== 'não' && v !== 'nao';
}

function findColuna(row, termos) {
  const keys = Object.keys(row);
  for (const k of keys) {
    const kn = k.trim().toUpperCase();
    for (const t of termos) {
      if (kn.includes(t.toUpperCase())) return k;
    }
  }
  return null;
}

function parseRow(row) {
  const keys = Object.keys(row);
  const kPedidoExato   = keys.find(k => k.trim().toUpperCase() === 'PEDIDO') || findColuna(row, ['PEDIDO']);
  const kPedidoCliente = findColuna(row, ['N° PEDIDO CLIENTE','Nº PEDIDO CLIENTE','PEDIDO CLIENTE','N PEDIDO CLIENTE']);
  const kNF            = findColuna(row, ['NF SAIDA','NF SAÍDA','NFSAIDA']);
  const kPrev          = findColuna(row, ['PREV. ENTREGA','PREV.ENTREGA','PREV ENTREGA','PREVISÃO','PREVISAO','PREV']);
  const kEntregue      = keys.find(k => k.trim().toUpperCase() === 'ENTREGUE') || findColuna(row, ['ENTREGUE']);
  return {
    pedido:        String(row[kPedidoExato]   || '').trim(),
    pedidoCliente: kPedidoCliente ? String(row[kPedidoCliente] || '').trim() : '',
    nf:            kNF       ? String(row[kNF]       || '').trim() : '',
    prev:          kPrev     ? String(row[kPrev]     || '').trim() : '',
    entregue:      kEntregue ? String(row[kEntregue] || '').trim() : '',
  };
}

let cardCount = 0;

function toggleComprovante(id) {
  document.getElementById(id).classList.toggle('show');
}

function renderCard(item) {
  const entregue = isEntregue(item.entregue);
  const id = 'comp_' + (++cardCount);
  const badge = entregue
    ? '<span class="badge badge-entregue"><span class="badge-dot"></span>Entregue</span>'
    : '<span class="badge badge-pendente"><span class="badge-dot"></span>Aguardando entrega</span>';
  const dataCell = entregue
    ? '<div class="info-cell"><div class="info-cell-label">Data de entrega</div><div class="info-cell-value green">' + formatDate(item.entregue) + '</div></div>'
    : '<div class="info-cell"><div class="info-cell-label">Previsão de entrega</div><div class="info-cell-value amber">' + formatDate(item.prev) + '</div></div>';
  const btnComp = entregue
    ? '<button class="btn-comprovante" onclick="toggleComprovante(\'' + id + '\')">📄 Ver Comprovante de Entrega</button>' +
      '<div class="comprovante-info" id="' + id + '">' +
      '<strong>📁 Como acessar o comprovante:</strong>' +
      'Abra o Explorador de Arquivos e procure pelo arquivo:<br>' +
      '<code>' + item.nf + '.pdf</code>' +
      '<code>NF' + item.nf + '.pdf</code>' +
      '</div>'
    : '';
  return '<div class="result-card">' +
    '<div class="result-header">' +
      '<div class="result-nf"><span>NF </span>' + (item.nf || '—') + '</div>' + badge +
    '</div>' +
    '<div class="info-grid">' +
      '<div class="info-cell"><div class="info-cell-label">Pedido</div><div class="info-cell-value">' + (item.pedido || '—') + '</div></div>' +
      '<div class="info-cell"><div class="info-cell-label">Pedido cliente</div><div class="info-cell-value">' + (item.pedidoCliente || '—') + '</div></div>' +
      dataCell +
      '<div class="info-cell"><div class="info-cell-label">Previsão original</div><div class="info-cell-value">' + formatDate(item.prev) + '</div></div>' +
    '</div>' + btnComp + '</div>';
}

async function buscar() {
  const inputVal = document.getElementById('nf-input').value;
  const query = norm(inputVal);
  const el = document.getElementById('results');
  if (!query) { el.innerHTML = ''; return; }
  cardCount = 0;
  el.innerHTML = '<div class="loading"><span class="spinner"></span>Consultando planilha...</div>';
  try {
    // Tenta direto primeiro, depois via proxy alternativo
    let data = null;
    try {
      const res1 = await fetch(API_URL, {redirect: 'follow'});
      if (res1.ok) data = await res1.json();
    } catch(e1) {}

    if (!data) {
      const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(API_URL);
      const res2 = await fetch(proxy);
      if (!res2.ok) throw new Error('HTTP ' + res2.status);
      const json2 = await res2.json();
      data = JSON.parse(json2.contents);
    }

    if (!Array.isArray(data)) throw new Error('Formato inválido');
    const rows = data.map(parseRow).filter(r => r.pedido || r.nf);
    const found = rows.filter(r =>
      norm(r.nf) === query ||
      norm(r.pedido) === query ||
      norm(r.pedidoCliente) === query
    );
    if (found.length === 0) {
      el.innerHTML = '<div class="error-box">Nenhum registro encontrado para <strong>"' + inputVal + '"</strong>. Verifique o número e tente novamente.</div>';
    } else {
      el.innerHTML = found.map(renderCard).join('');
    }
    document.getElementById('update-bar').textContent = 'Atualizado às ' + new Date().toLocaleTimeString('pt-BR');
  } catch(e) {
    console.error(e);
    el.innerHTML = '<div class="error-box">Erro ao acessar a planilha. Verifique sua conexão e tente novamente.</div>';
  }
}

document.getElementById('nf-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') buscar();
});
</script>
</body>
